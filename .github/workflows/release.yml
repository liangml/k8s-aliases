# =============================================================================
# kubectl-aliases Release Pipeline
# 打 tag 时自动构建并发布到 GitHub Releases
# =============================================================================
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      # 生成别名文件
      - name: Generate alias files
        run: make generate VERSION=${{ github.ref_name }}

      # 交叉编译二进制
      - name: Cross-compile
        run: make release VERSION=${{ github.ref_name }}

      # 打包为单个 tar.gz / zip
      - name: Package release artifacts
        run: |
          mkdir -p upload
          # 别名文件（重命名去掉前导点，避免 GitHub 转成 default. 前缀）
          cp .kubectl_aliases upload/kubectl_aliases
          cp .kubectl_aliases.fish upload/kubectl_aliases.fish
          # 各平台二进制
          for f in dist/*; do
            name=$(basename "$f")
            case "$name" in
              *.exe)
                (cd dist && zip -q "../upload/${name%.exe}.zip" "$name")
                ;;
              *)
                gzip -c "dist/$name" > "upload/$name.gz"
                ;;
            esac
          done
          echo "=== upload/ ==="
          ls -lh upload/

      # 创建 GitHub Release 并上传产物
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: kubectl-aliases ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## kubectl-aliases ${{ github.ref_name }}

            ### 包含文件
            - `kubectl_aliases` — bash/zsh 别名（691 条）
            - `kubectl_aliases.fish` — fish 别名（691 条）
            - `kubectl-aliases-darwin-amd64.gz` — macOS Intel
            - `kubectl-aliases-darwin-arm64.gz` — macOS Apple Silicon
            - `kubectl-aliases-linux-amd64.gz` — Linux x86_64
            - `kubectl-aliases-linux-arm64.gz` — Linux ARM64
            - `kubectl-aliases-windows-amd64.zip` — Windows x86_64

            ### 快速使用
            ```bash
            # 下载对应平台的二进制
            # 生成别名文件
            ./kubectl-aliases -o ~/.kubectl_aliases
            # 在 .bashrc / .zshrc 中添加
            echo '[ -f ~/.kubectl_aliases ] && source ~/.kubectl_aliases' >> ~/.zshrc
            ```
          files: upload/*
          draft: false
          prerelease: false
