# =============================================================================
# kubectl-aliases CI Pipeline
# 自动化质量门禁：lint → 构建 → 测试 → ShellCheck → 安全扫描
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: 代码质量检查 ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          golangci-lint run --timeout=3m ./...

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Trivy vulnerability scan
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy fs --severity HIGH,CRITICAL --exit-code 1 --no-progress .

  # ── Stage 2: 构建与测试 ────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Build (current platform)
        run: make build
        env:
          VERSION: ${{ github.sha }}

      - name: Cross-compile (all platforms)
        run: make release
        env:
          VERSION: ${{ github.sha }}

      - name: Alias generation smoke test
        run: make test
        env:
          VERSION: ${{ github.sha }}

      - name: Verify generated file syntax (bash)
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          ignore_paths: dist .git vendor

      - name: Upload cross-compiled binaries
        uses: actions/upload-artifact@v4
        with:
          name: kubectl-aliases-binaries
          path: dist/
          if-no-files-found: error

  # ── Stage 4: 容器构建（Docker） ────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --build-arg VERSION=${{ github.sha }} -t kubectl-aliases .

      - name: Smoke test Docker image
        run: |
          docker run --rm kubectl-aliases --version
          docker run --rm kubectl-aliases | head -5
